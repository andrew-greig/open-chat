<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversational</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Left Sidebar -->
<div class="sidebar">
  <!-- 1. Logo -->
  <div class="sidebar-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
  </div>

  <!-- 2. Clear Chat -->
  <button class="sidebar-btn" id="clearBtn" title="Clear chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>

  <!-- 3. Settings -->
  <button class="sidebar-btn" id="configToggle" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
  </button>

  <!-- 4. Theme -->
  <div class="sidebar-theme-dropdown">
    <button class="sidebar-btn" id="themeToggle" title="Change theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
    </button>
    <div class="theme-dropdown-menu" id="themeMenu">
      <button class="theme-option active" data-theme-val="default">
        <span class="theme-swatch default"></span>
        Default
      </button>
      <button class="theme-option" data-theme-val="claude">
        <span class="theme-swatch claude"></span>
        Claude
      </button>
      <button class="theme-option" data-theme-val="chatgpt">
        <span class="theme-swatch chatgpt"></span>
        ChatGPT
      </button>
    </div>
  </div>
</div>

<!-- Main Content Area -->
<div class="main-content">
  <!-- Model Pill -->
  <div class="model-pill-wrapper" id="modelPillWrapper">
    <div class="model-pill" id="modelPill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/>
        <circle cx="12" cy="16" r="2"/>
      </svg>
      <span id="modelPillText">No model selected</span>
      <svg class="model-pill-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
    <div class="model-dropdown-menu" id="modelDropdownMenu">
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <input type="file" id="fileInput" accept="image/*" hidden>
      <button class="attach-btn" id="attachBtn" title="Attach image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <button class="web-search-btn" id="webSearchToggle" title="Toggle web search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <textarea id="userInput" rows="1" placeholder="Message..." autocomplete="off"></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        <svg class="stop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <rect x="6" y="6" width="12" height="12" rx="1" ry="1"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send, Shift+Enter for new line</div>
    <div class="web-search-loading" id="webSearchLoading" style="display:none">
      <svg class="search-spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>Searching the web...</span>
    </div>
    <div class="image-preview-container" id="imagePreviewContainer">
      <div class="image-preview-wrapper">
        <img class="image-preview" id="imagePreview" src="" alt="Preview">
        <div class="image-preview-actions">
          <span class="image-filename" id="imageFilename"></span>
          <button class="image-remove-btn" id="imageRemoveBtn" title="Remove image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-modal">
    <div class="settings-header">
      <span class="settings-title">Settings</span>
      <button class="settings-close" id="settingsClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="settings-body">
      <!-- Server -->
      <div class="settings-group">
        <label class="settings-label" for="serverUrl">Server</label>
        <input class="settings-input" id="serverUrl" type="text" placeholder="http://100.93.192.73:1234">
      </div>
      <!-- API Key -->
      <div class="settings-group">
        <label class="settings-label" for="apiKey">API Key</label>
        <input class="settings-input" id="apiKey" type="password" placeholder="none" value="none">
      </div>
      <!-- Model -->
      <div class="settings-group">
        <label class="settings-label" for="modelSelect">Model</label>
        <div class="settings-model-row">
          <select class="settings-select" id="modelSelect">
            <option>Loading...</option>
          </select>
          <button class="settings-btn primary" id="fetchModels">Fetch Models</button>
        </div>
      </div>
      <!-- System Prompt -->
      <div class="settings-group">
        <label class="settings-label" for="systemPrompt">System Prompt</label>
        <input class="settings-input" id="systemPrompt" type="text" placeholder="You are a helpful assistant...">
      </div>
      <!-- Brave Search API Key -->
      <div class="settings-group">
        <label class="settings-label" for="braveApiKey">Brave Search API Key</label>
        <input class="settings-input" id="braveApiKey" type="password" placeholder="Enter your Brave API key...">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
<script src="app.js"></script>
</body>
</html>
